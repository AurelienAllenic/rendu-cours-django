<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricount — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #edf1fb 0%, #e8eeff 55%, #ede8ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Decorative blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: #a78bfa;
            top: -120px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: #6366f1;
            bottom: -100px; right: -80px;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 60px rgba(91,106,245,0.14), 0 1px 4px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 50px; height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, #5b6af5 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -1px;
            box-shadow: 0 4px 16px rgba(91,106,245,0.35);
        }
        .logo-name { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
        .logo-tagline { font-size: 12.5px; color: #94a3b8; margin-top: 1px; }

        /* Tabs */
        .tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 13px;
            padding: 4px;
            margin-bottom: 30px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: white;
            color: #5b6af5;
            font-weight: 600;
            box-shadow: 0 1px 10px rgba(91,106,245,0.15);
        }

        /* Form panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Error */
        .error-box {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 11px;
            padding: 11px 15px;
            color: #e11d48;
            font-size: 13.5px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 9px;
            line-height: 1.4;
        }
        .error-box svg { flex-shrink: 0; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 7px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        .optional { text-transform: none; font-weight: 400; color: #cbd5e1; letter-spacing: 0; }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 13px;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            background: #fafbff;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            outline: none;
        }
        input::placeholder { color: #c4cdd8; }
        input:focus {
            border-color: #5b6af5;
            box-shadow: 0 0 0 4px rgba(91,106,245,0.1);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, #5b6af5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.2px;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 20px rgba(91,106,245,0.3);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,106,245,0.38); }
        .btn-primary:active { transform: scale(0.99); opacity: 1; }

        .hint {
            font-size: 12.5px;
            color: #b0bec5;
            text-align: center;
            margin-top: 22px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">T₂</div>
        <div>
            <div class="logo-name">Tricount</div>
            <div class="logo-tagline">Partagez vos dépenses entre amis</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn {% if active_tab == 'login' %}active{% endif %}" onclick="switchTab('login')">Se connecter</button>
        <button class="tab-btn {% if active_tab == 'register' %}active{% endif %}" onclick="switchTab('register')">S'inscrire</button>
    </div>

    {% if error %}
    <div class="error-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
    </div>
    {% endif %}

    <!-- Connexion -->
    <div id="panel-login" class="panel {% if active_tab == 'login' %}active{% endif %}">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="votre_pseudo" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Connexion →</button>
        </form>
    </div>

    <!-- Inscription -->
    <div id="panel-register" class="panel {% if active_tab == 'register' %}active{% endif %}">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="register">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="votre_pseudo" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Email <span class="optional">(optionnel)</span></label>
                <input type="email" name="email" placeholder="vous@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="Min. 8 caractères" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" name="password2" placeholder="••••••••" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn-primary">Créer mon compte →</button>
        </form>
    </div>

    <div class="hint">Vos données sont privées et sécurisées.</div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
}
</script>
</body>
</html>
